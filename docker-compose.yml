version: "3.8"

# Internal service URLs are declared once in root .env as canonical names
# (MOCK_SVC, DB_SVC, etc.) and translated to each service's expected key name
# in the environment: block below. infra.env carries all other shared values.
#
# All backend services build from submodule source.
# Frontend services use custom Dockerfiles in dockerfiles/ to inject VITE vars at build time.

services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - automation-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --appendonly yes
    networks:
      - automation-network

  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - automation-network

  db-service:
    build:
      context: ./automation-db
      dockerfile: dockerfile
    container_name: db-service
    ports:
      - "5001:5001"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/db-service.env
    environment:
      API_SERVICE_KEY: ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - mongo
      - jaeger

  config-service:
    build:
      context: ./automation-config-service
      dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "5556:5556"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/config-service.env
    environment:
      AUTOMATION_DB_BASE_URL: ${DB_SVC}
      AUTOMATION_DB_API_KEY:  ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - redis
      - db-service
      - jaeger

  playground-mock-service:
    build:
      context: ./automation-mock-playground-service
      dockerfile: dockerfile
    container_name: playground-mock-service
    ports:
      - "3031:3000"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/playground-mock-service.env
    environment:
      API_SERVICE_URL:    ${API_SVC}
      CONFIG_SERVICE_URL: ${CONFIG_SVC}
    networks:
      - automation-network
    depends_on:
      - redis
      - config-service

  recorder-service:
    build:
      context: ./automation-recorder-service
      dockerfile: dockerfile
    container_name: recorder-service
    ports:
      - "8090:8090"
      - "8089:8089"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/recorder-service.env
    environment:
      RECORDER_DB_BASE_URL: ${DB_SVC}
      RECORDER_DB_API_KEY:  ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - redis
      - db-service

  report-pramaan-buyer:
    build:
      context: .
      dockerfile: dockerfiles/pramaan.Dockerfile
      args:
        SERVICE_DIR: automation-report-pramaan/buyerNPTestAPI
    container_name: report-pramaan-buyer
    ports:
      - "3005:3005"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/report-pramaan-buyer.env
    environment:
      BUYER_TESTING_URI: ${PRAMAAN_BUYER_SVC}
      SELLER_TESTING_URI: ${PRAMAAN_SELLER_SVC}
      PW_LOGS_API:        ${REPORT_SVC}
      PW_LOGS_API_KEY:    ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - mongo

  report-pramaan-seller:
    build:
      context: .
      dockerfile: dockerfiles/pramaan.Dockerfile
      args:
        SERVICE_DIR: automation-report-pramaan/sellerNPTestAPI
    container_name: report-pramaan-seller
    ports:
      - "3006:3005"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/report-pramaan-seller.env
    environment:
      BUYER_TESTING_URI: ${PRAMAAN_BUYER_SVC}
      SELLER_TESTING_URI: ${PRAMAAN_SELLER_SVC}
      PW_LOGS_API:        ${REPORT_SVC}
      PW_LOGS_API_KEY:    ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - mongo

  report-service:
    build:
      context: ./automation-report-service
      dockerfile: Dockerfile
    container_name: report-service
    ports:
      - "3000:3000"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/report-service.env
    environment:
      DATA_BASE_URL:      ${DB_SVC}
      AUTOMATION_BACKEND: ${UI_BACKEND_SVC}
      PRAMAAN_URL:        ${PRAMAAN_BUYER_SVC}/runtest
      API_SERVICE_KEY:    ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - redis
      - db-service
      - report-pramaan-buyer
      - report-pramaan-seller
      - jaeger

  automation-user-management:
    image: ghcr.io/ondc-official/automation-user-management:dev-0.0.0-3567db7
    platform: linux/amd64
    container_name: automation-user-management
    ports:
      - "8082:8082"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/automation-user-management.env
    networks:
      - automation-network
    depends_on:
      - mongo

  form-service:
    image: ghcr.io/ondc-official/automation-form-service:dev-1.0.0-7792084
    platform: linux/amd64
    container_name: form-service
    ports:
      - "3300:3300"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/form-service.env
    environment:
      MOCK_SERVICE_URL: ${MOCK_SVC}
      BACKEND_URL:      ${UI_BACKEND_SVC}
    networks:
      - automation-network
    depends_on:
      - redis

  backoffice-backend:
    build:
      context: ./automation-backoffice/backend
      dockerfile: Dockerfile
    container_name: backoffice-backend
    ports:
      - "5200:5000"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/backoffice-backend.env
    environment:
      DB_SERVICE:   ${DB_SVC}
      MOCK_SERVICE: ${MOCK_SVC}
      DB_KEY:       ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - redis
      - db-service
      - jaeger

  backoffice-frontend:
    build:
      context: .
      dockerfile: ./dockerfiles/backoffice-frontend.Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:5200
        VITE_BASE_URL: /backoffice
    container_name: backoffice-frontend
    ports:
      - "5100:5001"
    networks:
      - automation-network

  ui-backend:
    build:
      context: ./automation-frontend/backend
      dockerfile: Dockerfile
    container_name: ui-backend
    ports:
      - "3034:5000"
    env_file:
      - ./docker-env/infra.env
      - ./docker-env/ui-backend.env
    environment:
      API_SERVICE:             ${API_SVC}
      CONFIG_SERVICE:          ${CONFIG_SVC}
      DB_SERVICE:              ${DB_SVC}
      MOCK_SERVICE:            ${MOCK_SVC}
      REPORTING_SERVICE:       ${REPORT_SVC}
      IN_HOUSE_REGISTRY:       ${REGISTRY_SVC}
      DEVELOPER_GUIDE_SERVICE: ${USER_MGMT_SVC}
      API_SERVICE_KEY:         ${API_SVC_KEY}
      DB_SERVICE_API_KEY:      ${API_SVC_KEY}
    networks:
      - automation-network
    depends_on:
      - redis
      - db-service
      - config-service
      - report-service
      - playground-mock-service
      - automation-user-management
      - jaeger

  ui-frontend:
    build:
      context: .
      dockerfile: ./dockerfiles/ui-frontend.Dockerfile
      args:
        VITE_BAP_URL: http://localhost:3032/buyer
        VITE_BACKEND_URL: http://localhost:3034
        VITE_BASE_URL: http://localhost:3032
        VITE_BPP_URL: http://localhost:3032/seller
        VITE_DB_SERVICE_API_KEY: ${API_SVC_KEY}
        VITE_DEVELOPER_GUIDE_BACKEND_URL: http://localhost:8082
    container_name: ui-frontend
    ports:
      - "3035:5001"
    networks:
      - automation-network

volumes:
  mongo_data:
  redis_data:

networks:
  automation-network:
    driver: bridge
